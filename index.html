<!DOCTYPE html>
<html>
    <head>
        <title>Pomify</title>
        <style>
            * {
                font-family: "Atkinson Hyperlegible Mono", sans-serif;
                font-optical-sizing: auto;
                font-weight: 400;
                font-style: normal;
                color: #339989;
            }
            body {
                margin: 0;
                padding: 0;
                background-color: #283044;
                width: 100vw;
                height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
            }
            #timerContainer {
                position: relative;
                width: min(60vh, 60vw);
                height: min(60vh, 60vw);
                display: flex;
                justify-content: space-evenly;
                align-items: center;
                flex-direction: column;
            }
            #timerContainer svg {
                position: absolute;
                top: 0;
                left: 0;
            }
            #timerContent {
                position: relative;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 10px;
                z-index: 1;
            }
            #timer {
                text-align: center;
                font-size: 5rem;
                margin: 0;
            }
            #mode {
                text-align: center;
                font-size: 1.5rem;
                margin: 0;
            }
            #startStop {
                width: min(5vh, 5vw);
                height: min(5vh, 5vw);
                clip-path: polygon(0 0, 100% 50%, 100% 50%, 0 100%);
                background-color: #339989;
                transition: clip-path 0.3s ease;
                cursor: pointer;
            }
            #startStop.paused {
                clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
            }
        </style>
    </head>
    <body>
        <div id="timerContainer">
            <svg width="100%" height="100%" viewBox="0 0 300 300">
                <circle cx="150" cy="150" r="120" fill="none" stroke="#339989" stroke-width="5"/>
                <circle id="dot" cx="150" cy="30" r="10" fill="#283044" stroke="#339989" stroke-width="5"/>
            </svg>
            <div id="timerContent">
                <h1 id="timer">25:00</h1>
                <div onclick="startStop();" id="startStop"></div>
                <p id="mode">Work</p>
            </div>
        </div>
        <script>
            const WORK_MINS = 25;
            const BREAK_MINS = 5;

            let totalSeconds = WORK_MINS * 60;
            let secondsLeft = totalSeconds;
            let isRunning = false;
            let intervalId = null;
            let isWork = true;
            let sessions = 0;

            function updateDisplay(secondsRemaining) {
                const ceiled = Math.ceil(secondsRemaining);
                const mins = Math.floor(ceiled / 60);
                const secs = ceiled % 60;
                document.querySelector("#timer").innerText =
                    String(mins).padStart(2, "0") + ":" + String(secs).padStart(2, "0");

                const progress = secondsRemaining / totalSeconds;
                const angle = (2 * Math.PI * (1 - progress)) - Math.PI / 2;
                const dotX = 150 + 120 * Math.cos(angle);
                const dotY = 150 + 120 * Math.sin(angle);
                document.querySelector("#dot").setAttribute("cx", dotX);
                document.querySelector("#dot").setAttribute("cy", dotY);
            }

            function switchMode() {
                isWork = !isWork;
                if (isWork) {
                    totalSeconds = WORK_MINS * 60;
                    document.querySelector("#mode").innerText = "Work";
                } else {
                    sessions++;
                    totalSeconds = BREAK_MINS * 60;
                    document.querySelector("#mode").innerText = "Break";
                }
                secondsLeft = totalSeconds;
                updateDisplay(secondsLeft);
                startTimer();
            }

            let startTime = null;
            let pausedSecondsLeft = null;
            
            function startTimer() {
                isRunning = true;
                startTime = performance.now() - ((totalSeconds - secondsLeft) * 1000);
                
                function frame(timestamp) {
                    if (!isRunning) return;
                    const elapsed = (timestamp - startTime) / 1000;
                    secondsLeft = Math.max(totalSeconds - elapsed, 0);
                    updateDisplay(secondsLeft);
                    if (secondsLeft <= 0) {
                        isRunning = false;
                        switchMode();
                        return;
                    }
                    requestAnimationFrame(frame);
                }
                requestAnimationFrame(frame);
            }

            function startStop() {
                document.querySelector("#startStop").classList.toggle("paused");
                if (isRunning) {
                    isRunning = false;
                    secondsLeft = totalSeconds;
                    updateDisplay(secondsLeft);
                    isWork = false;
                    switchMode();
                    isRunning = false;
                } else {
                    startTimer();
                }
            }

            updateDisplay(secondsLeft);
        </script>
    </body>
</html>
