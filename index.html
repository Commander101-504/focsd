<!DOCTYPE html>
<html>
    <head>
        <title>Pomify</title>
        <style>
            * {
                font-family: "Atkinson Hyperlegible Mono", sans-serif;
                font-optical-sizing: auto;
                font-weight: 400;
                font-style: normal;
                color: #339989;
            }
            body {
                margin: 0;
                padding: 0;
                background-color: #283044;
                width: 100vw;
                height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
            }
            #timerContainer {
                width: min(60vh, 60vw);
                height: min(60vh, 60vw);
                border-radius: 50%;
                border: 5px solid #339989;
                display: flex;
                justify-content: space-evenly;
                align-items: center;
                flex-direction: column;
            }
            #timer {
                text-align: center;
                font-size: 5rem;
                margin: 0;
            }
            #mode {
                text-align: center;
                font-size: 1.5rem;
                margin: 0;
            }
            #startStop {
                width: min(5vh, 5vw);
                height: min(5vh, 5vw);
                clip-path: polygon(0 0, 100% 50%, 100% 50%, 0 100%);
                background-color: #339989;
                transition: clip-path 0.3s ease;
                cursor: pointer;
            }
            #startStop.paused {
                clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
            }
        </style>
    </head>
    <body onload="onLoad();">
        <div id="timerContainer">
            <h1 id="timer">25:00</h1>
            <div onclick="startStop();" id="startStop"></div>
            <p id="mode">Work</p>
        </div>
        <script>
            const WORK_MINS = 20;
            const BREAK_MINS = 5;

            let totalSeconds = WORK_MINS * 60;
            let secondsLeft = totalSeconds;
            let isRunning = false;
            let intervalId = null;
            let isWork = true;
            let sessions = 0;

            function onLoad() {
                updateDisplay(secondsLeft);
            }
            
            function updateDisplay(secondsRemaining) {
                const mins = Math.floor(secondsRemaining / 60);
                const secs = secondsRemaining % 60;
                document.querySelector("#timer").innerText =
                    String(mins).padStart(2, "0") + ":" + String(secs).padStart(2, "0");
            }

            function switchMode() {
                isWork = !isWork;
                if (isWork) {
                    totalSeconds = WORK_MINS * 60;
                    document.querySelector("#mode").innerText = "Work";
                } else {
                    sessions++;
                    totalSeconds = BREAK_MINS * 60;
                    document.querySelector("#mode").innerText = "Break";
                }
                secondsLeft = totalSeconds;
                updateDisplay(secondsLeft);
                startTimer();
            }

            function startTimer() {
                intervalId = setInterval(function() {
                    secondsLeft--;
                    updateDisplay(secondsLeft);
                    if (secondsLeft <= 0) {
                        clearInterval(intervalId);
                        switchMode();
                    }
                }, 1000);
            }

            function startStop() {
                document.querySelector("#startStop").classList.toggle("paused");
                if (isRunning) {
                    clearInterval(intervalId);
                    isRunning = false;
                } else {
                    startTimer();
                    isRunning = true;
                }
            }
        </script>
    </body>
</html>
